drive.share-base-url=${DRIVE_SHARE_BASE_URL:https://drive.nevtan.com/drive/share}

# NevTan SSO owns identity; Drive exchanges its tokens for Drive sessions.
sso.introspect-url=${SSO_INTROSPECT_URL:https://sso.nevtan.com/oauth/introspect}

# JWT_SECRET has no default here on purpose: startup must fail rather than sign
# production sessions with a publicly known development key.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Browser origins allowed to call the API. Wildcards are supported, so a new
# deployment hash under apps.nevtan.com does not need a config change.
drive.cors.allowed-origin-patterns=${DRIVE_CORS_ALLOWED_ORIGINS:https://*.apps.nevtan.com,https://drive.nevtan.com}

# DigitalOcean Spaces (S3-compatible object storage).
