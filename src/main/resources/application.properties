spring.application.name=nevtan-drive-api

spring.datasource.url=jdbc:h2:mem:nevtandrive;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=${DRIVE_MAX_UPLOAD_SIZE_BYTES:104857600}B
spring.servlet.multipart.max-request-size=${DRIVE_MAX_REQUEST_SIZE_BYTES:105906176}B

server.port=${SERVER_PORT:8081}

nevtan.cloud.enabled=${NEVTAN_CLOUD_ENABLED:false}
nevtan.cloud.base-url=${NEVTAN_CLOUD_BASE_URL:}
nevtan.cloud.api-key=${NEVTAN_CLOUD_API_KEY:}
nevtan.cloud.bucket=${NEVTAN_CLOUD_BUCKET:}
nevtan.cloud.upload-endpoint=${NEVTAN_CLOUD_UPLOAD_ENDPOINT:}
nevtan.cloud.download-endpoint=${NEVTAN_CLOUD_DOWNLOAD_ENDPOINT:}
nevtan.cloud.delete-endpoint=${NEVTAN_CLOUD_DELETE_ENDPOINT:}
nevtan.cloud.signed-url-endpoint=${NEVTAN_CLOUD_SIGNED_URL_ENDPOINT:}

# Identity lives in NevTan SSO. Clients sign in there, then exchange the SSO
# token at POST /api/drive/auth/sso for a Drive session, as CylonCloudAPI does.
sso.introspect-url=${SSO_INTROSPECT_URL:https://sso.nevtan.com/oauth/introspect}

# Signing key for Drive's own session tokens. Base64, at least 256 bits.
# The default is a development-only value and MUST be overridden in deployments.
app.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktbmV2dGFuLWRyaXZlLXNlY3JldC1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbg==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

drive.share-base-url=${DRIVE_SHARE_BASE_URL:http://localhost:5173/drive/share}
drive.storage-limit-bytes=${DRIVE_STORAGE_LIMIT_BYTES:1073741824}
drive.max-upload-size-bytes=${DRIVE_MAX_UPLOAD_SIZE_BYTES:104857600}
drive.blocked-extensions=${DRIVE_BLOCKED_EXTENSIONS:.exe,.bat,.cmd,.sh,.js,.jar}
drive.local-storage.root=${DRIVE_LOCAL_STORAGE_ROOT:./local-drive-storage}
# Deployed origins are listed here as well as in application-prod.properties so
# that CORS works even if the prod profile is not activated at startup.
drive.cors.allowed-origin-patterns=${DRIVE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,https://drive.nevtan.com,https://*.apps.nevtan.com}

#---
spring.config.activate.on-profile=stage

spring.datasource.url=${MYSQL_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nevtandrive_stage}?createDatabaseIfNotExist=false&useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:nevtandrive_stage}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${MYSQL_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

drive.share-base-url=${DRIVE_SHARE_BASE_URL:http://localhost:5173/drive/share}
